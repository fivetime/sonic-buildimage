# Intel QuickAssist (QAT) crypto accelerator on the Atom C3000 SoC is unused by
# SONiC. Its c3xxx driver fails to initialize on this platform and spams the
# kernel log (c3xxx 0000:01:00.0: Failed to send admin msg / Cannot get dc
# capabilities / Failed to send init message). Prevent auto-loading; QAT is not
# used for switching or MACsec offload on this platform.
blacklist qat_c3xxx
blacklist qat_c3xxxvf
