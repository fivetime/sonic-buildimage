name: build-sonic-vpp

# Self-compiles the SONiC-VPP image (software VPP/FD.io dataplane, no ASIC) as a
# KVM/qemu VM image -> target/sonic-vpp.img.gz.
#
# platform/vpp is a GIT SUBMODULE pointing at sonic-net/sonic-platform-vpp, so this
# build MUST checkout submodules recursively (else platform/vpp is an empty dir).
# The whole image is produced through THIS sonic-buildimage fork with PLATFORM=vpp.
#
# This is NOT the broadcom flow: different PLATFORM, different target, and a
# Trixie-only (Debian 13) build with no INCLUDE_ICCPD / Dell platform patches.
# The result is a VM image to run SONiC as a virtual router / soft-switch on x86.
#
# KVM CAVEAT: baking target/sonic-vpp.img.gz spins up a qemu VM to install onto a
# virtual disk. GitHub-hosted runners usually lack /dev/kvm (no nested virt), so the
# .img bake runs under slow TCG emulation and may time out. Prefer runner_label=
# 'self-hosted' (a host with /dev/kvm, e.g. 10.224.0.22) for this target.
#
# Trigger manually from the Actions tab (workflow_dispatch).

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: "Runner: 'self-hosted' (has /dev/kvm; recommended) or 'ubuntu-24.04' (GitHub-hosted, no KVM)"
        default: 'self-hosted'
        required: true
      build_jobs:
        description: 'SONIC_BUILD_JOBS (parallelism)'
        default: '4'
        required: true

jobs:
  build:
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 350          # just under GitHub's 6h hard cap
    permissions:
      contents: write            # gh release create needs write access to publish the image
    env:
      # README warns the VPP build pulls extra git repos and may PROMPT for
      # user/password while cloning — in headless CI that hangs forever. Force git
      # to fail fast on a missing credential instead of blocking on the prompt.
      GIT_TERMINAL_PROMPT: "0"
    steps:
      # ---- GitHub-hosted only: reclaim disk (frees ~30GB of preinstalled toolchains) ----
      - name: Free up disk space
        if: startsWith(inputs.runner_label, 'ubuntu')
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false     # keep docker functional
          swap-storage: true

      - name: Checkout (with submodules — platform/vpp IS a submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Verify platform/vpp submodule populated
        run: |
          set -eux
          test -e platform/vpp/Makefile || test -n "$(ls -A platform/vpp 2>/dev/null)" \
            || { echo "ERROR: platform/vpp is empty — submodule not checked out"; exit 1; }
          ls -la platform/vpp | head

      - name: Use UEFI-capable ONIE recovery image
        run: |
          set -eux
          ONIE_RULES=platform/vpp/rules/onie.mk
          sed -i '/^$(ONIE_RECOVERY_IMAGE)_URL/ s#/public/onie/#/public/onie/efi/#' "$ONIE_RULES"
          grep -F '$(ONIE_RECOVERY_IMAGE)_URL = "https://packages.trafficmanager.net/public/onie/efi/onie-recovery-x86_64-kvm_x86_64-r0.iso"' "$ONIE_RULES"

      # ---- GitHub-hosted only: push the biggest build outputs onto the 70GB /mnt disk ----
      - name: Relocate heavy build dirs to /mnt (bind mounts, NOT symlinks)
        if: startsWith(inputs.runner_label, 'ubuntu')
        run: |
          set -eux
          echo "docker version on runner:"; docker --version
          # target/ and the per-slave inner docker data-roots (fsroot.docker.*) are the
          # disk hogs. MUST use bind mounts, NOT symlinks: the build runs inside
          # sonic-slave-* containers that rbind-mount the workspace but NOT /mnt, so a
          # symlink dangles in-container (make configure Error 2). A bind mount is a real
          # dir entry docker's recursive bind carries into the slave container.
          sudo mkdir -p /mnt/sonic-target
          mkdir -p target
          sudo mount --bind /mnt/sonic-target target
          sudo chown "$USER" target
          for d in buster bullseye bookworm trixie; do
            sudo mkdir -p /mnt/fsroot.$d
            mkdir -p fsroot.docker.$d
            sudo mount --bind /mnt/fsroot.$d fsroot.docker.$d
            sudo chown "$USER" fsroot.docker.$d
          done
          df -h / /mnt

      - name: Install host build prerequisites
        run: |
          set -eux
          sudo apt-get update
          # VPP README prereqs: make automake autoconf python3-pip + a j2 CLI.
          sudo apt-get install -y python3-pip make automake autoconf
          # Python 3.12 removed 'imp' -> j2cli breaks; jinjanator provides the 'j2' CLI
          # that build_mirror_config.sh / prepare_docker_buildinfo.sh call on the host.
          pip3 install --break-system-packages jinjanator || sudo pip3 install --break-system-packages jinjanator
          j2 --version || true

      - name: Build options (rules/config.user)
        run: |
          set -eux
          # No INCLUDE_ICCPD for vpp; just carry build parallelism + skip tests.
          cat > rules/config.user <<EOF
          SONIC_BUILD_JOBS = ${{ inputs.build_jobs }}
          BUILD_SKIP_TEST = y
          EOF
          cat rules/config.user

      - name: Patch EOL Debian mirrors (buster archived; bullseye split)
        run: |
          set -eux
          python3 - <<'PY'
          import re, sys
          p='scripts/build_mirror_config.sh'
          s=open(p).read(); orig=s
          # PRISTINE 202505 lumps buster+bullseye onto archive.debian.org for MAIN only,
          # leaving SECURITY at the global debian-archive.trafficmanager.net default, which
          # 404s (EOL). Fixes (2026): buster fully archived (main+security on archive,
          # security suite 'buster/updates'); bullseye still in LTS (main+backports on
          # archive.debian.org/debian, security only on the live deb.debian.org mirror).
          s=s.replace(
          'if [ "$DISTRIBUTION" == "buster" ] || [ "$DISTRIBUTION" == "bullseye" ]; then\n    DEFAULT_MIRROR_URLS=http://archive.debian.org/debian/\nfi',
          'if [ "$DISTRIBUTION" == "buster" ]; then\n    DEFAULT_MIRROR_URLS=http://archive.debian.org/debian/\n    DEFAULT_MIRROR_SECURITY_URLS=http://archive.debian.org/debian-security/\nfi\nif [ "$DISTRIBUTION" == "bullseye" ]; then\n    DEFAULT_MIRROR_URLS=http://archive.debian.org/debian/\n    DEFAULT_MIRROR_SECURITY_URLS=http://deb.debian.org/debian-security/\nfi',1)
          s=s.replace(
          '\tif [ "$DISTRIBUTION" == "buster" ] || [ "$DISTRIBUTION" == "bullseye" ]; then\n\t\tDEFAULT_MIRROR_URLS=http://archive.debian.org/debian/,$BUILD_SNAPSHOT_URL/debian/$DEBIAN_TIMESTAMP/\n\tfi',
          '\tif [ "$DISTRIBUTION" == "buster" ]; then\n\t\tDEFAULT_MIRROR_URLS=http://archive.debian.org/debian/,$BUILD_SNAPSHOT_URL/debian/$DEBIAN_TIMESTAMP/\n\t\tDEFAULT_MIRROR_SECURITY_URLS=http://archive.debian.org/debian-security/,$BUILD_SNAPSHOT_URL/debian-security/$DEBIAN_SECURITY_TIMESTAMP/\n\tfi\n\tif [ "$DISTRIBUTION" == "bullseye" ]; then\n\t\tDEFAULT_MIRROR_URLS=http://archive.debian.org/debian/,$BUILD_SNAPSHOT_URL/debian/$DEBIAN_TIMESTAMP/\n\t\tDEFAULT_MIRROR_SECURITY_URLS=http://deb.debian.org/debian-security/,$BUILD_SNAPSHOT_URL/debian-security/$DEBIAN_SECURITY_TIMESTAMP/\n\tfi',1)
          open(p,'w').write(s)
          print("mirror patch changed:", s!=orig)
          PY
          echo "=== resulting distro branches ==="
          grep -nE 'DISTRIBUTION|archive.debian|deb.debian.org/debian' scripts/build_mirror_config.sh
          if grep -qF '"buster" ] || [ "$DISTRIBUTION" == "bullseye"' scripts/build_mirror_config.sh; then
            echo "ERROR: buster/bullseye mirror block was NOT split — patch did not match this branch's build_mirror_config.sh; update the patch." >&2
            exit 1
          fi

      - name: Patch docker.com CDN install (tolerate inconsistent apt index in image rootfs)
        run: |
          set -eux
          # build_debian.sh installs docker-ce/cli/containerd into the image's Debian rootfs
          # from download.docker.com, whose CloudFront apt index (InRelease vs Packages) is
          # briefly inconsistent during a Docker publish -> apt-get update size-mismatch
          # aborts the whole image build. Make it tolerant: fall back to the pinned debs
          # straight from the immutable pool.
          python3 - <<'PY'
          p='build_debian.sh'
          s=open(p).read()
          old=('sudo LANG=C chroot $FILESYSTEM_ROOT apt-get update\n'
               'sudo LANG=C chroot $FILESYSTEM_ROOT apt-get -y install docker-ce=${DOCKER_VERSION} docker-ce-cli=${DOCKER_VERSION} containerd.io=${CONTAINERD_IO_VERSION}')
          new=('sudo LANG=C chroot $FILESYSTEM_ROOT apt-get update || echo "[WARN] docker.list apt-get update failed (docker.com CDN inconsistent); installing docker debs directly from pool"\n'
               'DOCKER_POOL_URL="https://download.docker.com/linux/debian/dists/${IMAGE_DISTRO}/pool/stable/${CONFIGURED_ARCH}"\n'
               'DOCKER_VERSION_NOEPOCH="${DOCKER_VERSION#*:}"\n'
               'for _dfile in "containerd.io_${CONTAINERD_IO_VERSION}_${CONFIGURED_ARCH}.deb" "docker-ce-cli_${DOCKER_VERSION_NOEPOCH}_${CONFIGURED_ARCH}.deb" "docker-ce_${DOCKER_VERSION_NOEPOCH}_${CONFIGURED_ARCH}.deb" ; do\n'
               '    sudo https_proxy=$https_proxy LANG=C chroot $FILESYSTEM_ROOT curl -fsSL --retry 5 --retry-delay 3 -o "/tmp/${_dfile}" "${DOCKER_POOL_URL}/${_dfile}"\n'
               'done\n'
               'sudo LANG=C chroot $FILESYSTEM_ROOT apt-get -y install "/tmp/containerd.io_${CONTAINERD_IO_VERSION}_${CONFIGURED_ARCH}.deb" "/tmp/docker-ce-cli_${DOCKER_VERSION_NOEPOCH}_${CONFIGURED_ARCH}.deb" "/tmp/docker-ce_${DOCKER_VERSION_NOEPOCH}_${CONFIGURED_ARCH}.deb"')
          if old in s:
              open(p,'w').write(s.replace(old,new,1)); print("build_debian.sh docker CDN patch: APPLIED")
          else:
              print("build_debian.sh docker CDN patch: pattern not found (already patched or branch differs) — skipped")
          PY

      # ---- GitHub-hosted only: runner ships Docker 28 (BuildKit-only). SONiC's
      # collect_docker_version_files.sh does `docker build ... FROM sonic-slave-<dist>`
      # on a LOCAL never-pushed image — Docker >=25 BuildKit tries to PULL it and fails.
      # docker.io=24.x keeps the legacy builder that resolves local images. ----
      - name: Pin Docker to 24 (noble) — BuildKit>=25 can't FROM local slave images
        if: startsWith(inputs.runner_label, 'ubuntu')
        run: |
          set -eux
          docker --version
          sudo systemctl stop docker.service docker.socket || true
          sudo apt-get purge -y docker-ce docker-ce-cli docker-buildx-plugin docker-compose-plugin containerd.io || true
          sudo apt-get update
          sudo apt-get install -y --allow-downgrades --allow-change-held-packages docker.io
          sudo apt-mark hold docker.io
          sudo systemctl unmask docker.service docker.socket || true
          sudo systemctl reset-failed docker.service docker.socket || true
          sudo systemctl enable --now docker.socket
          sudo systemctl start docker.service
          sudo docker version
          DOCKER_BUILDKIT=0 docker build --help >/dev/null

      - name: Pin Scapy version to the Trixie wheel name
        run: |
          if [ -d src/scapy ]; then
            echo "2.6.1.dev0" > src/scapy/scapy/VERSION
            test "$(cat src/scapy/scapy/VERSION)" = "2.6.1.dev0"
          fi
          if [ -d src/sonic-frr/frr ]; then
            git -C src/sonic-frr/frr update-ref refs/remotes/origin/frr-10.3 HEAD
            fr="$(git -C src/sonic-frr/frr rev-parse --verify -q origin/frr-10.3 || echo MISSING)"
            echo "frr origin/frr-10.3 => $fr"
            case "$fr" in MISSING) echo "ERROR: frr origin ref not created"; exit 1 ;; esac
          fi

      - name: make init
        env: { DOCKER_BUILDKIT: "0", BUILDKIT_PROGRESS: plain }
        run: make init

      - name: make configure (PLATFORM=vpp, Debian 13/Trixie only)
        env: { DOCKER_BUILDKIT: "0", BUILDKIT_PROGRESS: plain }
        run: NOBULLSEYE=1 NOBUSTER=1 NOBOOKWORM=1 NOTRIXIE=0 make configure PLATFORM=vpp

      - name: make target/sonic-vpp.img.gz
        env: { DOCKER_BUILDKIT: "0", BUILDKIT_PROGRESS: plain }
        run: |
          NOBULLSEYE=1 NOBUSTER=1 NOBOOKWORM=1 NOTRIXIE=0 \
            make SONIC_BUILD_JOBS=${{ inputs.build_jobs }} \
               target/sonic-vpp.img.gz
          ls -la target/sonic-vpp.img.gz
          sha256sum target/sonic-vpp.img.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonic-vpp-img
          path: target/sonic-vpp.img.gz
          retention-days: 14
          if-no-files-found: error

      # Publish the VM image to GitHub Releases. Tag + filename are globally unique
      # per build (run_number is monotonic; UTC stamp + short SHA) so builds never clash.
      - name: Publish image to GitHub Releases
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_REF: ${{ github.ref_name }}
        run: |
          set -eux
          BRANCH="$BUILD_REF"
          REF_SLUG="${BRANCH//\//-}"
          SHORT="$(git rev-parse --short HEAD)"
          STAMP="$(date -u +%Y%m%d-%H%M%S)"
          TAG="img-vpp-${REF_SLUG}-${STAMP}-r${{ github.run_number }}-${SHORT}"
          ASSET="sonic-vpp-${REF_SLUG}-${STAMP}-${SHORT}.img.gz"
          cp "target/sonic-vpp.img.gz" "$ASSET"
          SHA256="$(sha256sum "$ASSET" | awk '{print $1}')"
          gh release create "$TAG" "$ASSET" --repo "${{ github.repository }}" --title "SONiC-VPP ${BRANCH} @ ${SHORT} (${STAMP} UTC)" --notes "PLATFORM=vpp KVM VM image (VPP/FD.io soft dataplane). branch=${BRANCH} commit=${SHORT} run=${{ github.run_id }} sha256=${SHA256}"
          echo "Published $ASSET as release $TAG"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            target/**/*.log
            sonic-slave-*/*.log
          retention-days: 7
          if-no-files-found: ignore
