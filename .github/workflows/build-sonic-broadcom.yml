name: build-sonic-broadcom

# Self-compiles a SONiC Broadcom image WITH the MC-LAG control daemon (INCLUDE_ICCPD=y),
# which the community/official images ship disabled. Produces target/sonic-broadcom.bin
# as a downloadable artifact. One image flashes both Z9264F and Z9100 (same broadcom platform).
#
# Trigger manually from the Actions tab (workflow_dispatch).
# runner_label: 'ubuntu-24.04' = GitHub-hosted (free, but disk/time are marginal — see notes);
#               'self-hosted'  = your own registered runner (e.g. 10.224.0.22, proven-good).

on:
  workflow_dispatch:
    inputs:
      branch:
        # Free text so any current/future branch or tag works with no list to maintain.
        # Alternatively you can drop this input entirely and use the web UI's native
        # "Use workflow from" ref selector — but that requires this workflow file to also
        # exist on the target branch, whereas free-text builds any branch from master.
        description: 'branch/tag to build (any name, e.g. 202505, 202511, master)'
        type: string
        default: '202505'
        required: true
      platform:
        description: 'SONiC PLATFORM'
        default: 'broadcom'
        required: true
      runner_label:
        description: "Runner: 'ubuntu-24.04' (GitHub-hosted) or 'self-hosted'"
        default: 'ubuntu-24.04'
        required: true
      build_jobs:
        description: 'SONIC_BUILD_JOBS (parallelism)'
        default: '4'
        required: true

jobs:
  build:
    runs-on: ${{ github.event.inputs.runner_label }}
    timeout-minutes: 350          # just under GitHub's 6h hard cap
    steps:
      # ---- GitHub-hosted only: reclaim disk (frees ~30GB of preinstalled toolchains) ----
      - name: Free up disk space
        if: startsWith(github.event.inputs.runner_label, 'ubuntu')
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false     # keep docker functional
          swap-storage: true

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          submodules: recursive
          fetch-depth: 1

      # ---- GitHub-hosted only: push the biggest build outputs onto the 70GB /mnt disk ----
      - name: Relocate heavy build dirs to /mnt (bind mounts, NOT symlinks)
        if: startsWith(github.event.inputs.runner_label, 'ubuntu')
        run: |
          set -eux
          echo "docker version on runner:"; docker --version
          # target/ (debs + docker-*.gz + squashfs + final .bin) and the per-slave inner
          # docker data-roots (fsroot.docker.*) are the disk hogs. Move them to /mnt.
          # MUST use bind mounts, NOT symlinks: `make configure` and the build run inside
          # sonic-slave-* containers that rbind-mount the workspace but NOT /mnt, so a
          # `target -> /mnt/...` symlink dangles in-container and versions_manager.py's
          # os.makedirs('./target/versions') dies with FileNotFoundError (make configure
          # Error 2). A bind mount is a real dir entry that docker's recursive bind carries
          # into the slave container.
          sudo mkdir -p /mnt/sonic-target
          mkdir -p target
          sudo mount --bind /mnt/sonic-target target
          sudo chown "$USER" target
          for d in buster bullseye bookworm; do
            sudo mkdir -p /mnt/fsroot.$d
            mkdir -p fsroot.docker.$d
            sudo mount --bind /mnt/fsroot.$d fsroot.docker.$d
            sudo chown "$USER" fsroot.docker.$d
          done
          df -h / /mnt

      - name: Install host build prerequisites
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y python3-pip make
          # Python 3.12 removed 'imp' -> j2cli breaks; jinjanator provides the 'j2' CLI
          # that build_mirror_config.sh / prepare_docker_buildinfo.sh call on the host.
          pip3 install --break-system-packages jinjanator || sudo pip3 install --break-system-packages jinjanator
          j2 --version || true

      - name: Enable INCLUDE_ICCPD (MC-LAG) and build options
        run: |
          set -eux
          # rules/config.user overrides rules/config
          cat > rules/config.user <<EOF
          INCLUDE_ICCPD = y
          SONIC_BUILD_JOBS = ${{ github.event.inputs.build_jobs }}
          BUILD_SKIP_TEST = y
          EOF
          # also flip the default in rules/config in case config.user isn't honoured on this branch
          sed -i 's/^INCLUDE_ICCPD ?*=.*/INCLUDE_ICCPD = y/' rules/config || true
          grep -nE 'INCLUDE_ICCPD' rules/config rules/config.user

      - name: Patch EOL Debian mirrors (buster archived; bullseye split)
        run: |
          set -eux
          python3 - <<'PY'
          import re, sys
          p='scripts/build_mirror_config.sh'
          s=open(p).read(); orig=s
          # PRISTINE 202505 lumps buster+bullseye onto archive.debian.org for MAIN only,
          # leaving SECURITY at the global debian-archive.trafficmanager.net default, which
          # 404s (EOL). Fixes (2026): buster is fully archived (main+security on archive,
          # security suite 'buster/updates'); bullseye is still in LTS (main+backports on
          # archive.debian.org/debian, but security only on the live deb.debian.org mirror).
          # Match the pristine combined block (MAIN line only, no security line) and split it.
          # --- non-snapshot branch (4-space indent) ---
          s=s.replace(
          'if [ "$DISTRIBUTION" == "buster" ] || [ "$DISTRIBUTION" == "bullseye" ]; then\n    DEFAULT_MIRROR_URLS=http://archive.debian.org/debian/\nfi',
          'if [ "$DISTRIBUTION" == "buster" ]; then\n    DEFAULT_MIRROR_URLS=http://archive.debian.org/debian/\n    DEFAULT_MIRROR_SECURITY_URLS=http://archive.debian.org/debian-security/\nfi\nif [ "$DISTRIBUTION" == "bullseye" ]; then\n    DEFAULT_MIRROR_URLS=http://archive.debian.org/debian/\n    DEFAULT_MIRROR_SECURITY_URLS=http://deb.debian.org/debian-security/\nfi',1)
          # --- snapshot branch (tab indent, MAIN line only) ---
          s=s.replace(
          '\tif [ "$DISTRIBUTION" == "buster" ] || [ "$DISTRIBUTION" == "bullseye" ]; then\n\t\tDEFAULT_MIRROR_URLS=http://archive.debian.org/debian/,http://packages.trafficmanager.net/snapshot/debian/$DEBIAN_TIMESTAMP/\n\tfi',
          '\tif [ "$DISTRIBUTION" == "buster" ]; then\n\t\tDEFAULT_MIRROR_URLS=http://archive.debian.org/debian/,http://packages.trafficmanager.net/snapshot/debian/$DEBIAN_TIMESTAMP/\n\t\tDEFAULT_MIRROR_SECURITY_URLS=http://archive.debian.org/debian-security/,http://packages.trafficmanager.net/snapshot/debian-security/$DEBIAN_SECURITY_TIMESTAMP/\n\tfi\n\tif [ "$DISTRIBUTION" == "bullseye" ]; then\n\t\tDEFAULT_MIRROR_URLS=http://archive.debian.org/debian/,http://packages.trafficmanager.net/snapshot/debian/$DEBIAN_TIMESTAMP/\n\t\tDEFAULT_MIRROR_SECURITY_URLS=http://deb.debian.org/debian-security/,http://packages.trafficmanager.net/snapshot/debian-security/$DEBIAN_SECURITY_TIMESTAMP/\n\tfi',1)
          open(p,'w').write(s)
          print("mirror patch changed:", s!=orig)
          PY
          echo "=== resulting distro branches ==="
          grep -nE 'DISTRIBUTION|archive.debian|deb.debian.org/debian' scripts/build_mirror_config.sh
          # GUARD: fail fast if the combined buster||bullseye block still exists (i.e. the
          # patch did not match this branch's file format). Branches with no such block
          # (bookworm/trixie-only) match nothing here and pass, which is correct.
          if grep -qF '"buster" ] || [ "$DISTRIBUTION" == "bullseye"' scripts/build_mirror_config.sh; then
            echo "ERROR: buster/bullseye mirror block was NOT split — patch did not match this branch's build_mirror_config.sh; update the patch." >&2
            exit 1
          fi

      - name: Patch docker.com CDN install (tolerate inconsistent apt index in image rootfs)
        run: |
          set -eux
          # build_debian.sh installs docker-ce/cli/containerd into the image's Debian rootfs
          # from download.docker.com, whose CloudFront apt index (InRelease vs Packages) is
          # briefly inconsistent during a Docker publish -> `apt-get update` size-mismatch
          # aborts the whole image build. Make it tolerant: fall back to installing the pinned
          # debs straight from the immutable pool (system deps still resolve from the mirror).
          python3 - <<'PY'
          p='build_debian.sh'
          s=open(p).read()
          old=('sudo LANG=C chroot $FILESYSTEM_ROOT apt-get update\n'
               'sudo LANG=C chroot $FILESYSTEM_ROOT apt-get -y install docker-ce=${DOCKER_VERSION} docker-ce-cli=${DOCKER_VERSION} containerd.io=${CONTAINERD_IO_VERSION}')
          new=('sudo LANG=C chroot $FILESYSTEM_ROOT apt-get update || echo "[WARN] docker.list apt-get update failed (docker.com CDN inconsistent); installing docker debs directly from pool"\n'
               'DOCKER_POOL_URL="https://download.docker.com/linux/debian/dists/${IMAGE_DISTRO}/pool/stable/${CONFIGURED_ARCH}"\n'
               'DOCKER_VERSION_NOEPOCH="${DOCKER_VERSION#*:}"\n'
               'for _dfile in "containerd.io_${CONTAINERD_IO_VERSION}_${CONFIGURED_ARCH}.deb" "docker-ce-cli_${DOCKER_VERSION_NOEPOCH}_${CONFIGURED_ARCH}.deb" "docker-ce_${DOCKER_VERSION_NOEPOCH}_${CONFIGURED_ARCH}.deb" ; do\n'
               '    sudo https_proxy=$https_proxy LANG=C chroot $FILESYSTEM_ROOT curl -fsSL --retry 5 --retry-delay 3 -o "/tmp/${_dfile}" "${DOCKER_POOL_URL}/${_dfile}"\n'
               'done\n'
               'sudo LANG=C chroot $FILESYSTEM_ROOT apt-get -y install "/tmp/containerd.io_${CONTAINERD_IO_VERSION}_${CONFIGURED_ARCH}.deb" "/tmp/docker-ce-cli_${DOCKER_VERSION_NOEPOCH}_${CONFIGURED_ARCH}.deb" "/tmp/docker-ce_${DOCKER_VERSION_NOEPOCH}_${CONFIGURED_ARCH}.deb"')
          if old in s:
              open(p,'w').write(s.replace(old,new,1)); print("build_debian.sh docker CDN patch: APPLIED")
          else:
              print("build_debian.sh docker CDN patch: pattern not found (already patched or branch differs) — skipped")
          PY

      # ---- GitHub-hosted only: the runner ships Docker 28 (BuildKit-only; legacy builder
      # removed). SONiC's collect_docker_version_files.sh cleans the version cache with
      # `docker build -f Dockerfile.cleanup ... FROM sonic-slave-<dist>:<tag>` on a LOCAL,
      # never-pushed image — Docker >=25 BuildKit tries to PULL it and fails (pull access
      # denied). Ubuntu noble's docker.io=24.x still has the legacy builder that resolves
      # local images, matching the proven-good build server. Pin to it. ----
      - name: Pin Docker to 24 (noble) — BuildKit>=25 can't FROM local slave images
        if: startsWith(github.event.inputs.runner_label, 'ubuntu')
        run: |
          set -eux
          docker --version
          sudo systemctl stop docker.service docker.socket || true
          sudo apt-get purge -y docker-ce docker-ce-cli docker-buildx-plugin docker-compose-plugin containerd.io || true
          sudo apt-get update
          sudo apt-get install -y --allow-downgrades --allow-change-held-packages docker.io
          sudo apt-mark hold docker.io
          sudo systemctl unmask docker.service docker.socket || true
          sudo systemctl reset-failed docker.service docker.socket || true
          sudo systemctl enable --now docker.socket
          sudo systemctl start docker.service
          sudo docker version
          # legacy builder must be available (DOCKER_BUILDKIT=0 path)
          DOCKER_BUILDKIT=0 docker build --help >/dev/null

      - name: Fix scapy submodule version (PEP440-valid; avoid git-hash on fresh checkout)
        run: |
          if [ -d src/scapy ]; then
            echo "2.4.5" > src/scapy/scapy/VERSION
            git -C src/scapy -c user.email=ci@local -c user.name=ci tag -a -f -m "v2.4.5" v2.4.5 HEAD
            desc="$(git -C src/scapy describe --always 2>&1)"
            echo "scapy describe => $desc"
            case "$desc" in v2.4.5*) : ;; *) echo "ERROR: scapy tag not applied (describe=$desc)"; exit 1 ;; esac
          fi
          if [ -d src/sonic-frr/frr ]; then
            git -C src/sonic-frr/frr update-ref refs/remotes/origin/frr-10.3 HEAD
            fr="$(git -C src/sonic-frr/frr rev-parse --verify -q origin/frr-10.3 || echo MISSING)"
            echo "frr origin/frr-10.3 => $fr"
            case "$fr" in MISSING) echo "ERROR: frr origin ref not created"; exit 1 ;; esac
          fi

      - name: make init
        env: { DOCKER_BUILDKIT: "0", BUILDKIT_PROGRESS: plain }
        run: make init

      - name: make configure
        env: { DOCKER_BUILDKIT: "0", BUILDKIT_PROGRESS: plain }
        run: make configure PLATFORM=${{ github.event.inputs.platform }}

      - name: make target/sonic-broadcom.bin
        env: { DOCKER_BUILDKIT: "0", BUILDKIT_PROGRESS: plain }
        run: |
          make SONIC_BUILD_JOBS=${{ github.event.inputs.build_jobs }} \
               target/sonic-${{ github.event.inputs.platform }}.bin
          ls -la target/sonic-${{ github.event.inputs.platform }}.bin
          sha256sum target/sonic-${{ github.event.inputs.platform }}.bin

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonic-${{ github.event.inputs.platform }}-bin
          path: target/sonic-${{ github.event.inputs.platform }}.bin
          retention-days: 14
          if-no-files-found: error

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            target/**/*.log
            sonic-slave-*/*.log
          retention-days: 7
          if-no-files-found: ignore
